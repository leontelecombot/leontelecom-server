<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Panel Admin León Telecom</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      color: #333;
      font-size: 2em;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #666;
      font-size: 0.95em;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.95em;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Admin Panel</h1>
      <p>León Telecom</p>
    </div>

    <div id="alert" class="alert"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password">Contraseña de Administrador:</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Ingresa tu contraseña"
          required
          autofocus
        >
      </div>

      <button type="submit" id="loginBtn">
        Ingresar al Panel
      </button>
    </form>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const alert = document.getElementById('alert');

      if (!password) {
        alert.textContent = 'Por favor ingresa la contraseña';
        alert.className = 'alert alert-error';
        alert.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';

      fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            sessionStorage.setItem('admin_auth', data.token);
            window.location.href = '/admin/dashboard';
          } else {
            alert.textContent = data.error || 'Contraseña incorrecta';
            alert.className = 'alert alert-error';
            alert.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Ingresar al Panel';
            document.getElementById('password').value = '';
          }
        })
        .catch(e => {
          alert.textContent = 'Error de conexión: ' + e.message;
          alert.className = 'alert alert-error';
          alert.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Ingresar al Panel';
        });
    }
  </script>
</body>
</html>
