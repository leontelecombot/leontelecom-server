services:
  - type: web
    name: leontelecom-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai-compatible
      - key: AI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.1-8b-instant
      - key: DEMO_MODE
        value: "true"
      - key: FIBER_PLAN_MEDIA_URL
        value: https://drive.google.com/uc?export=view&id=13ho0x5wUS_Uus5MhJrNq0blMOzk39Ffn
      - key: WIRELESS_PLAN_MEDIA_URL
        value: https://drive.google.com/uc?export=view&id=1Zc5Xg8W4S0izF088yA5k32WyI8i83sFO
      - key: LEON_CONTACT_NUMBER
        value: "9511603125"
      - key: AGENT_NOTIFY_CHAT_ID
        value: ""
      - key: AGENT_NOTIFY_WEBHOOK_URL
        value: ""