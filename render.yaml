services:
  - type: web
    name: leontelecom-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # ---- WhatsApp Cloud API ----
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        value: leontelecom-verify
      # Plantilla aprobada para avisos masivos (corte/reparación/reactivado),
      # permite enviar a TODOS aunque hayan pasado +24h. Cuerpo con un {{1}}.
      - key: WHATSAPP_AVISO_TEMPLATE
        sync: false
      # Plantilla de Marketing con encabezado de imagen + {{1}}, para promos a todos
      - key: WHATSAPP_PROMO_TEMPLATE
        sync: false
      - key: WHATSAPP_TEMPLATE_LANG
        value: es_MX
      # Número WhatsApp del asesor para notificaciones (formato: 529xxxxxxxxx)
      - key: AGENT_WHATSAPP_NUMBER
        sync: false

      # ---- Servidor ----
      # URL pública de Render para servir imágenes de planes
      - key: SERVER_BASE_URL
        value: https://leontelecom-server.onrender.com

      # ---- AI (Claude/Anthropic) ----
      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL
        value: claude-haiku-4-5-20251001
      - key: AI_API_KEY
        sync: false

      # ---- Telegram (opcional, notificaciones internas) ----
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AGENT_NOTIFY_CHAT_ID
        value: ""
      - key: AGENT_NOTIFY_WEBHOOK_URL
        value: ""

      # ---- Media ----
      - key: FIBER_PLAN_MEDIA_URL
        value: https://drive.google.com/uc?export=view&id=13ho0x5wUS_Uus5MhJrNq0blMOzk39Ffn
      - key: WIRELESS_PLAN_MEDIA_URL
        value: https://drive.google.com/uc?export=view&id=1Zc5Xg8W4S0izF088yA5k32WyI8i83sFO

      # ---- Admin ----
      - key: ADMIN_PASSWORD
        sync: false
      # Secreto para firmar los tokens del panel (se genera solo, no tocar)
      - key: ADMIN_SECRET
        generateValue: true
      - key: LEON_CONTACT_NUMBER
        value: "951 169 7346"

      # ---- Persistencia ----
      # Opción recomendada: MongoDB Atlas (tier gratis M0, NO expira).
      # Pega aquí tu connection string de Atlas (mongodb+srv://...).
      - key: MONGODB_URI
        sync: false
      # Alternativa: PostgreSQL (p. ej. Render). La free de Render expira a los ~30 días.
      - key: DATABASE_URL
        sync: false
